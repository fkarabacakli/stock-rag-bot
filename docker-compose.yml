# Reference configuration — use this file if containers are not already running.
# To start: docker compose up -d

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # For NVML / GPU visibility (Toolkit must be installed)
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    # RTX 5070 GPU — requires Docker Compose v2 + NVIDIA Container Toolkit.
    # If deploy is insufficient in some setups, uncomment the line below:
    # gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    # Pull model if missing on first startup:
    # docker exec -it ollama ollama pull qwen2.5:7b

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8001:8000"
    # Current image writes data under /data; /chroma/chroma is old docs path that left host dir empty
    volumes:
      - ./chroma_data:/data
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - ANONYMIZED_TELEMETRY=false
    restart: unless-stopped

volumes:
  ollama_data:
